<!DOCTYPE html>
<html>
<head>
    <title>Email Generator</title>

    <script>
        function generateEmail(form) {
            // Access form elements
            var fname = form.fname.value;
            var lname = form.lname.value;

            // String concatenation
            var email = fname + "." + lname + "@park.edu";

            // Display email using innerHTML
            document.getElementById("result").innerHTML = "Generated Email: " + email;

            // Reset form
            form.reset();

            // Set focus back to first name
            form.fname.focus();
        }
    </script>

</head>

<body>

    <h2>Email Address Generator</h2>

    <form onsubmit="generateEmail(this); return false;">
        First Name: <input type="text" name="fname" required><br><br>
        Last Name: <input type="text" name="lname" required><br><br>

        <input type="submit" value="Generate Email">
    </form>

    <p id="result"></p>

    <hr>

    <p><b>Name:</b> G. Swaroop</p>
    <p><b>Registration Number:</b> 24BCT0035</p>

</body>
</html>
