<!DOCTYPE html>
<html>
<head>
  <title>React Todo List</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      background-color: #f1f1f1;
      font-family: Arial;
    }

    .container {
      width: 350px;
      margin: 80px auto;
      padding: 20px;
      border: 2px solid #333;
      border-radius: 10px;
      text-align: center;
      background-color: #ffffff;
    }

    input {
      padding: 8px;
      width: 70%;
      margin-right: 5px;
    }

    button {
      padding: 8px 12px;
      cursor: pointer;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 15px;
    }

    li {
      background: #fff;
      margin: 5px 0;
      padding: 8px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    .details {
      margin-top: 15px;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">

function TodoApp() {
  const [task, setTask] = React.useState("");
  const [tasks, setTasks] = React.useState([]);

  const addTask = () => {
    if (task.trim() === "") return;
    setTasks([...tasks, task]);
    setTask("");
  };

  return (
    <div className="container">
      <h2>Todo List</h2>

      <input
        type="text"
        value={task}
        onChange={(e) => setTask(e.target.value)}
        placeholder="Enter a task"
      />

      <button onClick={addTask}>Add</button>

      <ul>
        {tasks.map((t, index) => (
          <li key={index}>{t}</li>
        ))}
      </ul>

      <div className="details">
        <p><b>Name:</b> Swaroop</p>
        <p><b>Registration Number:</b> 24BCT0035</p>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<TodoApp />);

</script>

</body>
</html>
