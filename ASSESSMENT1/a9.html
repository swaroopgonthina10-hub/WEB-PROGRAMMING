    <title>Image Source Tutorial</title>
</head>
<body>

    <h2>Image Source Methods</h2>

    <h3>1. External URL (Absolute Link)</h3>
    <img src="https://via.placeholder.com/200" alt="External Website Image" width="200">

    <h3>2. Local Computer Path (Absolute Path)</h3>
    <img src="file:///C:/Images/local_photo.jpg" alt="Local Computer Image" width="200">

    <h3>3. Project Folder (Relative Path)</h3>
    <img src="logo.png" alt="Project Folder Image" width="200">
